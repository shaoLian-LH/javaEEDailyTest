<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>修改图书信息</title>
<style>
	*{
		margin:0 auto;
		padding:o;
	}
	h2{
		text-align: center;
		margin-bottom: 10px;
	}
	th{
		align:center;
		text-align: center;
	}
</style>
</head>
<body>
	<h2>修改图书信息</h2>
	<form>
		<table border="1">
			<tr>
				<th>书名：</th>
				<td><input type="text" name="bookname" value="XML详解"/></td>
			</tr>
			<tr>
				<th>作者：</th>
				<td><input type="text" name="author" value="王红丽"/></td>
			</tr>
			<tr>
				<th>出版社：</th>
				<td><input type="text" name="press" value="吉林大学出版社"/></td>
			</tr>
			<tr>
				<th>价格：</th>
				<td><input type="text" name="price" value="34"/></td>
			</tr>
			<tr>
				<th colspan="2">
					<input type="submit" value="修改" />
					<input type="reset" value="重置" />
				</th>
			</tr>			
		</table>
	</form>
</body>
</html>
