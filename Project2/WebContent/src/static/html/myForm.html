<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../src/static/css/myForm_css.css" />
<script src="../src/static/javascript/jquery-3.3.1.min.js" type="text/javascript" charset="utf-8"></script>
<script src="../src/static/javascript/myForm_js.js" type="text/javascript" charset="utf-8"></script>

</head>
<body>
	<form>
		<table>
			<tr>
				<td colspan="2" class="hTitle">信&nbsp;&nbsp;息&nbsp;&nbsp;统&nbsp;&nbsp;计&nbsp;&nbsp;表</td>
			</tr>
			<tr>
				<th>姓名：</th>
				<td><input type="text" name="name" /></td>
			</tr>
			<tr>
				<th>年龄：</th>
				<td><input type="text" name="age" /></td>
			</tr>
			<tr>
				<th>性别：</th>
				<td>
					<input type="radio" name="sex" value="男" checked="checked" />男&nbsp;&nbsp;
					<input type="radio" name="sex" value="女" />女
				</td>
			</tr>
			<tr>
				<th>爱好：</th>
				<td>
					<input type="checkbox" name="favorite" value="旅游" />旅游<br />
					<input type="checkbox" name="favorite" value="登山" />登山<br />
					<input type="checkbox" name="favorite" value="健身" />健身<br />
					<input type="checkbox" name="favorite" value="上网" />上网<br />
					<input type="checkbox" name="favorite" value="游泳" />游泳<br />
				</td>
			</tr>
			<tr>
				<th>学历：</th>
				<td>
					<select size="1" name="record" >
						<option value="" disabled selected hidden>--请选择--</option>
						<option value="中专以下">中专以下</option>
						<option value="中专">中专</option>
						<option value="高中">高中</option>
						<option value="专科">专科</option>
						<option value="本科">本科</option>
						<option value="本科以上">本科以上</option>
					</select>
				</td>
			</tr>
			<tr>
				<th>自我介绍：</th>
				<td>
					<textarea name="intro" rows="5" cols="25" placeholder="自我介绍："></textarea>
				</td>
			</tr>
			<tr>
				<th></th>
				<td>
					<input type="submit" value="提交" />
					<input type="reset" value="重置" />
				</td>
			</tr>
		</table>
	</form>
</body>
</html>
