<%@ page pageEncoding="utf-8"%>
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Insert title here</title>
<script src="../src/static/javascript/jquery-3.3.1.min.js" type="text/javascript" charset="utf-8"></script>
<script src="../src/static/javascript/reg_js.js" type="text/javascript" charset="utf-8"></script>
<style>
	*{
		margin: 0 auto;
		padding: 0;
	}
	body,table,td,input,select,textarea{
		font-family: Tahoma,Verdana,Arialmsans-serif;
		font-size: 12px;
	}
	h2{
		color:#0000FF;
		font-family:微软雅黑;
		font-weight:bold;
		text-align:center;
	}
	a{
		display:inline-block;
		text-decoration: none;
		border:1px solid black; 
		border-radius: 5px;
		padding: 0 10px;
	}
	#submit{
		font-size: 9pt;
		color:#003399;
		cursor:hand;
		width: 60px;
		height:22px;
	}
</style>
</head>
<body>
	<h2>用户注册</h2>
	<form method="post" id="myForm" >
		<table>
			<tr>
				<th>姓名</th>
				<td><input type="text" name="name"/></td>
			</tr>
			<tr>
				<th>密码</th>
				<td><input type="password" name="password_1"/></td>
			</tr>
			<tr>
				<th>确认密码</th>
				<td><input type="password" name="password_2"></td>
			</tr>
			<tr>
				<th>性别</th>
				<td>
					<input type="radio" name="male" value="male" checked />男
					<input type="radio" name="female" value="female" />女
				</td>
			</tr>
			<tr>
				<th>职业</th>
				<td>
					<select size="1" name="career">
						<option value="教育工作者" selected>教育工作者</option>
						<option value="公司职员">公司职员</option>
						<option value="自由职业者">自由职业者</option>
						<option value="其他">其他</option>
					</select>
				</td>
			</tr>
			<tr>
				<th>电话号码</th>
				<td><input type="text" name="telephone" maxlength="11"/></td>
			</tr>
			<tr>
				<th>电子邮箱</th>
				<td><input type="text" name="email" size="30" /></td>
			</tr>
			<tr>
				<th>兴趣爱好</th>
				<td>
					<input type="checkbox" name="favorite" value="sport" />体育
					<input type="checkbox" name="favorite" value="read" />看书
					<input type="checkbox" name="favorite" value="travel" />旅游
					<input type="checkbox" name="favorite" value="specility" />美食
				</td>
			</tr>
			<tr>
				<th>自我简介</th>
				<td>
					<textarea name="intro" rows="5" cols="30">
					</textarea>
				</td>
			</tr>
			<tr>
				<td colspan="2" align="center">
					<a href="###" id="submit">注册</a>
				</td>
			</tr>
		</table>
	</form>
</body>
</html>
